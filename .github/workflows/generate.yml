name: generate item dumps

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft

      - uses: gradle/actions/setup-gradle@v5

      - name: Fetch latest versions
        run: bash scripts/fetch-versions.sh

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run gametest
        uses: modmuss50/xvfb-action@v1
        with:
          run: ./gradlew runClientGametest --stacktrace

      - name: Commit dumps
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add generated/items.json generated/items_grouped.json
          git diff --cached --quiet || git commit -m "update item dumps for ${{ env.MC_VERSION }}"
          git push origin HEAD
