name: Generate item dumps

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 1-7 * 5' # first Friday of the month at 5pm PT
      timezone: "America/Los_Angeles"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper

      - name: Fetch latest versions
        run: bash scripts/fetch-versions.sh

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: microsoft

      - name: Run gametest
        run: gradle runClientGameTest --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: item-dumps-${{ env.MC_VERSION }}
          path: |
            generated/items.json
            generated/items_grouped.json

      - name: Commit dumps
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add generated/items.json generated/items_grouped.json
          git diff --cached --quiet || git commit -m "update item dumps for ${{ env.MC_VERSION }}"
          git push origin HEAD
